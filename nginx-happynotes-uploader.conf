# 完整的nginx配置示例
# 基于Happy Notes上传服务器的实际需求

upstream koa2_upload_backend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# HTTP服务器（生产环境建议重定向到HTTPS）
server {
    listen 80;
    server_name happynotes-uploader.yourdomain.com;  # 替换为您的域名
    
    # 基础设置
    client_max_body_size 50M;  # 根据MAX_FILE_SIZE调整
    client_body_timeout 300s;
    client_header_timeout 300s;
    
    # 🆕 SSE进度API - 关键配置！
    location /api/progress/ {
        proxy_pass http://koa2_upload_backend;
        
        # SSE必需配置
        proxy_buffering off;              # 禁用缓冲
        proxy_cache off;                  # 禁用缓存  
        proxy_set_header X-Accel-Buffering no;  # nginx不缓冲响应
        
        # 长连接支持
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";
        proxy_read_timeout 3600s;         # 1小时超时
        proxy_send_timeout 60s;
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS支持（Flutter Web需要）
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        
        # 处理OPTIONS请求
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # 文件上传API - 优化配置
    location /api/upload {
        proxy_pass http://koa2_upload_backend;
        
        # 流式上传，不缓冲整个请求体
        proxy_request_buffering off;
        
        # 上传超时设置（匹配Flutter的1800秒）
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;         # 30分钟
        proxy_read_timeout 1800s;         # 30分钟
        
        # HTTP/1.1支持
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS支持
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # 上传状态查询API
    location /api/upload/status/ {
        proxy_pass http://koa2_upload_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers 'Authorization';
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # 配置API（现有的）
    location /config {
        proxy_pass http://koa2_upload_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS
        add_header Access-Control-Allow-Origin *;
    }
    
    # 演示页面（测试用）
    location / {
        proxy_pass http://koa2_upload_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# HTTPS配置（生产环境推荐）
server {
    listen 443 ssl http2;
    server_name happynotes-uploader.yourdomain.com;
    
    # SSL证书配置（请替换为您的证书路径）
    ssl_certificate /etc/ssl/certs/your-cert.pem;
    ssl_certificate_key /etc/ssl/private/your-key.pem;
    
    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:!aNULL:!MD5:!DSS;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 基础设置
    client_max_body_size 50M;
    client_body_timeout 300s;
    
    # 🆕 SSE进度API - HTTPS版本
    location /api/progress/ {
        proxy_pass http://koa2_upload_backend;
        
        # SSE配置（同HTTP版本）
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";
        proxy_read_timeout 3600s;
        proxy_send_timeout 60s;
        
        # HTTPS代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;  # 注意这里是https
        proxy_set_header X-Forwarded-Ssl on;
        
        # CORS
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # 其他location配置（同HTTP版本，但添加HTTPS代理头）
    location /api/upload {
        proxy_pass http://koa2_upload_backend;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # ... 其他location配置
}

# HTTP到HTTPS重定向
server {
    listen 80;
    server_name happynotes-uploader.yourdomain.com;
    return 301 https://$server_name$request_uri;
}